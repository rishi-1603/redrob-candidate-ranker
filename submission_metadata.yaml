ai_usage_summary: |
  Used Claude for architecture discussion, code review, and presentation deck.
  All engineering decisions, scoring logic, and signal weights were designed
  based on careful reading of the JD and submission spec. No candidate data
  was fed to any LLM during the ranking step.

methodology_summary: |
  Rule-based multi-signal hybrid scorer with five components: career history
  (35%), skills with anti-stuffing trust multiplier (30%), experience years
  (15%), logistics/location (20%), and a behavioral multiplier (0.30-1.30x).
  Career signal reads actual job descriptions for production AI evidence.
  Honeypot detection blocks impossible profiles. Runtime: 15 seconds on CPU
  for 100K candidates. No API calls, no GPU, pure Python stdlib.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true